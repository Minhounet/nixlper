name: Tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Syntax-check all bash sources
        run: |
          status=0
          for f in src/main/bash/*.sh src/test/bash/*.sh install.sh build.sh build-rpm.sh build-deb.sh; do
            [[ -f "$f" ]] || continue
            if bash -n "$f"; then
              echo "ok   $f"
            else
              echo "FAIL $f"
              status=1
            fi
          done
          exit $status

      - name: Run update-detection unit tests
        run: bash src/test/bash/test_functions_update.sh

      - name: Run target-staging unit tests
        run: bash src/test/bash/test_functions_target.sh

      - name: Run config-editor unit tests
        run: bash src/test/bash/test_functions_config.sh

      - name: Run macro-recording unit tests
        run: bash src/test/bash/test_functions_macros.sh
