name: Publish edge build on push

# Rolling "edge" channel: every push to main rebuilds the tar and overwrites a single
# pre-release tagged `edge`, so edge-channel users always pull the latest commit from a
# stable URL (releases/download/edge/nixlper-edge.tar). Marked prerelease so it never
# appears as the stable "latest" release.
on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: edge-release
  cancel-in-progress: true

jobs:
  publish-edge:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y dos2unix rpm

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build tar archive
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Build RPM package
        run: |
          chmod +x ./build-rpm.sh
          ./build-rpm.sh

      - name: Build DEB package
        run: |
          chmod +x ./build-deb.sh
          ./build-deb.sh

      - name: Stage edge artifacts
        run: |
          mkdir -p edge-dist
          cp build/distributions/nixlper.tar edge-dist/nixlper-edge.tar
          RPM_PATH=$(find "${HOME}/rpmbuild/RPMS" -name "nixlper-*.rpm" | head -1)
          cp "${RPM_PATH}" edge-dist/nixlper-edge.rpm
          DEB_PATH=$(find build/distributions -name "nixlper_*_all.deb" | head -1)
          cp "${DEB_PATH}" edge-dist/nixlper-edge.deb

      - name: Generate release notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          SHA="${{ github.sha }}"
          if [[ -n "$LAST_TAG" ]]; then
            COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count --no-merges)
            {
              echo "Rolling build of the latest commit on \`main\` (\`${SHA:0:7}\`)."
              echo ""
              echo "## 🚧 Ongoing work since ${LAST_TAG} (${COUNT} commits)"
              echo ""
              git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (\`%h\`)" --no-merges
              echo ""
              echo ""
              echo "---"
              echo "*Auto-generated on every push to \`main\`.*"
            } > edge-release-notes.md
          else
            echo "Rolling build of the latest commit on \`main\` (\`${SHA:0:7}\`). Auto-generated and overwritten on every push." > edge-release-notes.md
          fi

      - name: Refresh edge pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Drop the previous edge release and its tag so we can re-point it at the new commit.
          gh release delete edge --yes --cleanup-tag || true
          gh release create edge \
            edge-dist/nixlper-edge.tar \
            edge-dist/nixlper-edge.rpm \
            edge-dist/nixlper-edge.deb \
            --title "Edge (latest commit)" \
            --notes-file edge-release-notes.md \
            --prerelease \
            --target "${{ github.sha }}"
