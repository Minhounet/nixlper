name: Release version on tag

on:
  push:
    tags:
      - "*"
      # The rolling "edge" tag is managed by publish_edge_on_push.yml — never treat it as a release.
      - "!edge"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to create and release (e.g. v2.2.0)'
        required: true
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y dos2unix rpm

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.email "noreply@github.com"
          git config user.name "GitHub Actions"
          git tag ${{ steps.tag.outputs.name }}
          git push origin ${{ steps.tag.outputs.name }}

      - name: Build RPM package
        run: |
          chmod +x ./build-rpm.sh
          ./build-rpm.sh

      - name: Build DEB package
        run: |
          chmod +x ./build-deb.sh
          ./build-deb.sh

      - name: Locate built packages
        id: paths
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"
          RPM_VERSION="${VERSION//-/_}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          RPM_PATH=$(find "${HOME}/rpmbuild/RPMS" -name "nixlper-${RPM_VERSION}-*.rpm" | head -1)
          echo "rpm_path=${RPM_PATH}" >> "$GITHUB_OUTPUT"
          echo "rpm_name=$(basename "${RPM_PATH}")" >> "$GITHUB_OUTPUT"
          DEB_PATH=$(find build/distributions -name "nixlper_*_all.deb" | head -1)
          echo "deb_path=${DEB_PATH}" >> "$GITHUB_OUTPUT"
          echo "deb_name=$(basename "${DEB_PATH}")" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} found && /^## \\[/{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          release_name: ${{ steps.tag.outputs.name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload tar archive
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/distributions/nixlper-${{ steps.tag.outputs.name }}.tar
          asset_name: nixlper-${{ steps.tag.outputs.name }}.tar
          asset_content_type: application/x-tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload RPM package
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.paths.outputs.rpm_path }}
          asset_name: ${{ steps.paths.outputs.rpm_name }}
          asset_content_type: application/x-rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DEB package
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.paths.outputs.deb_path }}
          asset_name: ${{ steps.paths.outputs.deb_name }}
          asset_content_type: application/vnd.debian.binary-package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
